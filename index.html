<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Pour Eva ❤️</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
background:linear-gradient(135deg,#ff9a9e,#fecfef);
font-family:Arial;
color:white;
text-align:center;
}

#title{
position:absolute;
top:80px;
width:100%;
font-size:30px;
}

#btn{
position:absolute;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:15px;
background:white;
color:#ff4d6d;
cursor:pointer;
}

#message{
display:none;
position:absolute;
top:45%;
width:100%;
font-size:60px;
}

.heart{
position:absolute;
color:#ff4d6d;
animation:fall linear infinite;
}

@keyframes fall{
from{
transform:translateY(-10vh);
opacity:1;
}
to{
transform:translateY(110vh);
opacity:0;
}
}

</style>
</head>

<body>

<div id="title">Attrape le bouton 😏</div>

<button id="btn">Clique moi</button>

<div id="message">💖 Eva je t'aime 💖</div>

<script>

let clicks = 0
const btn = document.getElementById("btn")
const title = document.getElementById("title")

const texts = [
"Encore 😌",
"Eh beh dépêche toi !",
"Ça peut être très long...",
"T'es sûr tu veux vraiment savoir ?",
"Bon ok... voilà 😳"
]

function moveButton(){

const x = Math.random() * (window.innerWidth - 120)
const y = Math.random() * (window.innerHeight - 60)

btn.style.left = x + "px"
btn.style.top = y + "px"

}

btn.addEventListener("click", () => {

title.innerText = texts[clicks]

clicks++

if(clicks < 5){

moveButton()

}
else{

btn.style.display="none"
title.style.display="none"
document.getElementById("message").style.display="block"

startHearts()

}

})

moveButton()

/* pluie de coeurs */

function createHeart(){

const heart=document.createElement("div")
heart.classList.add("heart")

heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(15+Math.random()*25)+"px"
heart.style.animationDuration=(3+Math.random()*3)+"s"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},6000)

}

function startHearts(){

setInterval(createHeart,200)

}

</script>

</body>
</html>
